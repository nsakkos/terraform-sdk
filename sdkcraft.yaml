# Thin Terraform Workshop SDK.
#
# Ships ONLY the HashiCorp Terraform CLI as a prebuilt binary — no credentials,
# no provider configuration, no Vault/state/cloud tooling. Optional capabilities
# (a persistent provider plugin cache, SSH-agent access for private git modules)
# are exposed as plugs the consuming workshop wires as needed.
name: terraform-cli
# The version is adopted from the ./VERSION file at build time (see the
# `terraform` part's override-pull -> `craftctl set version`). VERSION is the
# single source of truth; Renovate bumps it and the packed artifact follows.
adopt-info: terraform
summary: The HashiCorp Terraform CLI, packaged as a thin Workshop SDK
description: |
  A thin Workshop SDK that installs the HashiCorp Terraform CLI from the
  official release archive. It carries no credentials and no provider
  configuration — only the terraform executable, an optional persistent
  provider plugin cache (mount plug), and optional SSH-agent access for
  fetching private git modules during `terraform init`/`get`.
# BUSL-1.1 reflects the bundled Terraform binary (>= 1.6). The SDK packaging
# (this definition + hooks) is trivial glue distributed under the same terms.
license: BUSL-1.1
platforms:
  ubuntu@22.04:amd64:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:

parts:
  terraform:
    # HashiCorp ships prebuilt binaries, so we download + unpack rather than
    # build from source. override-pull reads the pinned version from ./VERSION
    # (Renovate's bump target) and `craftctl set version` adopts it as the SDK
    # version — keeping VERSION the single source of truth (no literal to drift).
    # CRAFT_ARCH_BUILD_FOR (amd64/arm64) matches HashiCorp's linux_<arch> asset.
    plugin: dump
    source: . # placeholder — override-pull replaces the fetch step entirely
    build-packages:
      - unzip # extract HashiCorp's zip in override-pull (no native dump fetch)
    override-pull: |
      VERSION="$(cat "${CRAFT_PROJECT_DIR}/VERSION")"
      craftctl set version="${VERSION}"
      curl -fsSL -o "${CRAFT_PART_SRC}/terraform.zip" \
        "https://releases.hashicorp.com/terraform/${VERSION}/terraform_${VERSION}_linux_${CRAFT_ARCH_BUILD_FOR}.zip"
      cd "${CRAFT_PART_SRC}"
      unzip -o terraform.zip
      rm -f terraform.zip
    organize:
      # The archive holds a bare `terraform` at its root; move it under bin/ so
      # setup-base can add a single, predictable directory to PATH.
      terraform: bin/terraform
    prime:
      # Ship ONLY the binary — never the placeholder-source repo files.
      - bin/terraform

plugs:
  # Fetch private git modules over SSH during `terraform init`/`get` using the
  # host's ssh-agent. Opt-in: the ssh-agent interface never auto-connects, so
  # the consumer wires it explicitly with
  # `workshop connect <workshop>/terraform-cli:ssh-agent`.
  ssh-agent:
    interface: ssh-agent

# No mount plug is declared for the provider plugin cache: mount plugs always
# auto-connect to system:mount (there is no per-plug opt-out), which would make
# a host-backed cache mandatory. Keeping the cache OPTIONAL, setup-base points
# TF_PLUGIN_CACHE_DIR at a plain local directory that setup-project creates. A
# consumer who wants the cache to survive a rebuilding refresh can graft a mount
# at that path in their own workshop.yaml (see README, "Persistent plugin cache").
