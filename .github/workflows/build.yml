name: Build SDK

on:
  pull_request:
    branches:
      # Version branches this SDK publishes from (major-only: track "1").
      - "[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: canonical/sdkcraft-actions/.github/workflows/build.yml@main
